about_profile_image: images/profile.jpg
about_content: |
  I am a **Data Science leader specializing in building enterprise AI systems for banking and financial services**.  
  My work focuses on turning advanced machine learning research into **production-grade AI products** that deliver measurable business impact.

  I currently lead the **Data Science function**, where I design and implement end-to-end AI platforms covering:

  - Credit risk and retail scoring models
  - Customer analytics and churn prediction
  - Next Best Product recommendation systems
  - Conversational AI and RAG-based chatbots
  - MLOps and real-time scoring infrastructure

  My technical stack includes **Python, SQL, Machine Learning, Deep Learning, LLM systems, RAG architectures, MLOps, Docker, and Data Warehouse engineering**.

  I have extensive experience building **large-scale ML pipelines**, deploying models via **FastAPI microservices**, integrating them into **business decision systems**, and managing **AI governance and model lifecycle processes**.

  My goal is to build **scalable AI systems that transform how organizations make decisions and serve customers**.

content:
  - title: Projects
    layout: list
    content:

      - layout: left
        title: Retail Credit Risk ML Platform
        quote: >
          Production ML scoring platform for retail credit decisioning.
        description: |
          Designed and implemented an **end-to-end machine learning pipeline** for retail credit risk scoring.

          Key components:
          - Feature engineering using large-scale **customer transaction and financial data**
          - Logistic regression and gradient boosting models
          - WOE/IV feature transformation
          - Automated model monitoring (PSI, CSI, drift detection)
          - Deployment via **FastAPI microservices**
          - Integration with business process management (BPM) decision systems

      - layout: left
        title: Retail Customer Churn Prediction
        quote: >
          Predictive analytics system for identifying at-risk banking customers.
        description: |
          Developed machine learning models to predict **customer churn for retail banking products**.

          Solution included:
          - Monthly customer-level datamart construction
          - Behavioral features from transactions, balances, and product usage
          - Gradient boosting models (LightGBM, CatBoost)
          - Model explainability using **SHAP**
          - Campaign targeting to reduce attrition.

      - layout: left
        title: Next Best Product Recommendation Engine
        quote: >
          ML-based recommendation system for cross-selling banking products.
        description: |
          Built a **Next Best Product (NBP)** recommendation engine that identifies the most relevant banking products for each customer.

          Techniques used:
          - Customer segmentation
          - Behavioral feature engineering
          - Propensity models
          - Campaign integration with CRM systems.

      - layout: left
        title: AI Retail Chatbot (RAG Architecture)
        quote: >
          Conversational AI system powered by local LLM infrastructure.
        description: |
          Designed and implemented a **Retrieval-Augmented Generation (RAG) chatbot** for banking knowledge support.

          Architecture includes:
          - FastAPI backend
          - ChromaDB vector database
          - Multilingual embeddings
          - Local LLM deployment via **Ollama**
          - Context retrieval and reranking pipelines.

